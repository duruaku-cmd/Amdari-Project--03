# Gitleaks configuration for SentinelPay.
# Extends the default ruleset and adds a SentinelPay AWS-key rule.
# Historical placeholder findings are handled by .gitleaksignore (pinned
# fingerprints), NOT by broad allowlist regexes. New secrets always block.
title = "SentinelPay Gitleaks Config"

[extend]
useDefault = true

[[rules]]
id = "sentinelpay-aws-access-key"
description = "AWS Access Key ID (AKIA/ASIA/AROA/AIDA) in source"
regex = '''(A3T[A-Z0-9]|AKIA|ASIA|AROA|AIDA)[A-Z0-9]{16}'''
keywords = ["AKIA", "ASIA", "AROA", "AIDA"]
