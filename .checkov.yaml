# =============================================================================
#  Checkov configuration for SentinelPay Terraform  (Day 17 IaC gate)
#  "Tuned, not silenced": each skip below is an explicit, justified risk
#  decision, mirroring the OPA exception process. Two skip categories:
#    [DESIGN]   - the finding is intentional for this architecture
#    [LAB/PROD] - valid production hardening, deferred for a Free-Tier lab and
#                 recorded as a production recommendation (see Day-17 ADR)
#  Everything NOT skipped here is expected to PASS (the 13 real fixes are applied
#  in the Terraform itself). A passing gate = zero findings above this documented
#  baseline.
# =============================================================================
framework:
  - terraform
compact: true
quiet: true

skip-check:
  # ---------- [DESIGN] intentional for the SentinelPay architecture ----------
  - CKV_AWS_260   # ALB SG ingress 0.0.0.0/0:80 — the ALB is the single public entry point; it MUST accept web traffic. This is the design.
  - CKV_AWS_382   # SG egress to 0.0.0.0/0 — default egress; ingress is already locked by SG-reference chaining.
  - CKV_AWS_2     # ALB listener not HTTPS — lab has no ACM cert/domain; HTTPS is a documented production recommendation.
  - CKV_AWS_103   # Listener TLS<1.2 — same: no HTTPS listener in the lab environment.
  - CKV_AWS_378   # Target group HTTP — ALB→task traffic is inside private subnets; internal HTTP acceptable, TLS-everywhere is a prod rec.
  - CKV2_AWS_20   # ALB no HTTP→HTTPS redirect — no HTTPS listener in lab.
  - CKV_AWS_111   # KMS policy write w/o constraint — standard root+key-admin policy; scoped by the key. Reviewed.
  - CKV_AWS_356   # IAM '*' resource — KMS/containment use service-scoped wildcards on actions that require them; OPA already blocks customer-managed *-on-*.
  - CKV_AWS_109   # IAM permissions mgmt w/o constraint — same KMS-admin pattern.
  - CKV_AWS_107   # IAM credentials exposure — containment Lambda role scoped to its function. Reviewed.
  - CKV_AWS_273   # honeytoken is IAM user not SSO — DELIBERATE: the honeytoken is a decoy IAM user; that is its entire purpose.
  - CKV_AWS_40    # honeytoken policy on user — the deny-all policy is intentionally attached to the decoy user.
  - CKV_AWS_130   # public subnet public IP — public subnets host the ALB and require this; private subnets do not assign public IPs.
  - CKV2_AWS_3    # GuardDuty not enabled — coded behind a toggle; Free-Tier account cannot subscribe (V-CLD-07, documented Week 2).

  # ---------- [LAB/PROD] valid hardening deferred for the Free-Tier lab -------
  - CKV_AWS_157   # RDS Multi-AZ — Free-Tier is single-AZ; Multi-AZ is a production recommendation.
  - CKV_AWS_293   # RDS deletion protection — the lab must support teardown; enable in production.
  - CKV_AWS_118   # RDS enhanced monitoring — incurs cost; production recommendation.
  - CKV_AWS_353   # RDS performance insights — incurs cost on some classes; production recommendation.
  - CKV_AWS_161   # RDS IAM auth — app uses Secrets Manager rotation; IAM auth is an additional production option.
  - CKV2_AWS_30   # RDS query logging — log_connections already on; full query logging is a production rec.
  - CKV2_AWS_60   # RDS copy-tags-to-snapshots — minor production nicety.
  - CKV2_AWS_50   # ElastiCache Multi-AZ failover — Free-Tier single node; production recommendation.
  - CKV2_AWS_57   # Secrets Manager rotation on redis_auth — RDS master IS rotated; redis AUTH rotation is a production enhancement.
  - CKV_AWS_116   # Lambda DLQ — event-driven containment fn; DLQ is a production resilience add.
  - CKV_AWS_50    # Lambda X-Ray — tracing is a production observability add.
  - CKV_AWS_272   # Lambda code signing — inline containment fn; code-signing config is a production add.
  - CKV_AWS_117   # Lambda in VPC — containment fn needs AWS API access, not VPC resources; VPC attach optional.
  - CKV_AWS_115   # Lambda concurrency limit — low-volume containment fn.
  - CKV_AWS_252   # CloudTrail SNS topic — optional; CloudTrail already streams to CloudWatch Logs.
  - CKV_AWS_150   # ALB deletion protection — the lab must support teardown; enable in production.
  - CKV2_AWS_62   # S3 event notifications — low value for the lab; can be added in production.
