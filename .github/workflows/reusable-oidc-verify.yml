# Reusable: assume the Day-9 OIDC deploy role and PROVE it is not admin.
# This is the V-PIP-03 control point — the pipeline authenticates with a
# short-lived OIDC session (no static keys) to a SCOPED role.
name: reusable-oidc-verify

on:
  workflow_call:
    inputs:
      aws_region:
        type: string
        default: af-south-1
      role_arn:
        type: string
        # The Day-9 repo-scoped deploy role (NOT AdministratorAccess).
        default: arn:aws:iam::627807502880:role/sentinelpay-dev-github-deploy

permissions:
  id-token: write
  contents: read

jobs:
  oidc:
    runs-on: ubuntu-latest
    steps:
      - name: Configure AWS credentials via OIDC (no long-lived keys)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ inputs.role_arn }}
          aws-region: ${{ inputs.aws_region }}
          role-session-name: gha-${{ github.run_id }}

      - name: Confirm short-lived identity
        run: aws sts get-caller-identity

      - name: Assert deploy role is NOT AdministratorAccess (V-PIP-03)
        run: |
          ROLE_NAME=$(echo "${{ inputs.role_arn }}" | awk -F/ '{print $NF}')
          echo "Auditing attached policies on $ROLE_NAME ..."
          ATTACHED=$(aws iam list-attached-role-policies --role-name "$ROLE_NAME" \
                     --query "AttachedPolicies[].PolicyArn" --output text || echo "")
          echo "Attached: $ATTACHED"
          if echo "$ATTACHED" | grep -q "AdministratorAccess"; then
            echo "::error::Deploy role has AdministratorAccess. V-PIP-03 not remediated. Failing closed."
            exit 1
          fi
          echo "PASS: deploy role carries no AdministratorAccess policy."
