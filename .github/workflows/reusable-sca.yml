# Reusable gate: SCA (dependency vulnerability scanning) with Trivy.
# Trivy installed directly (no wrapper action) into a writable dir to avoid both
# the broken transitive setup-trivy pin AND /usr/local/bin permission issues.
# THRESHOLD: CRITICAL/HIGH with an available fix block; unfixed/MEDIUM/LOW reported.
# FAILS CLOSED: a Trivy execution error blocks the merge.
name: reusable-sca

on:
  workflow_call:

permissions:
  contents: read

jobs:
  sca:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Trivy
        run: |
          mkdir -p "$HOME/.local/bin"
          curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh \
            | sh -s -- -b "$HOME/.local/bin" v0.58.0
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
          "$HOME/.local/bin/trivy" --version

      - name: Trivy filesystem scan (dependencies)
        run: |
          trivy fs \
            --scanners vuln \
            --severity CRITICAL,HIGH \
            --ignore-unfixed \
            --exit-code 1 \
            --format table \
            .

      - name: Gate summary
        if: always()
        run: echo "SCA complete. CRITICAL/HIGH with an available fix block the merge; unfixed and MEDIUM/LOW are reported."
