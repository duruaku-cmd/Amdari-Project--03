# Reusable gate: SCA (dependency scanning) with Trivy, run as the OFFICIAL
# CONTAINER. No install script, no version-tag download, no PATH/permissions.
# GitHub runners always have Docker, so this cannot fail on install.
# THRESHOLD: CRITICAL/HIGH fixable block; unfixed/MEDIUM/LOW reported. FAILS CLOSED.
name: reusable-sca

on:
  workflow_call:

permissions:
  contents: read

jobs:
  sca:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Trivy filesystem scan (dependencies) via official container
        run: |
          docker run --rm \
            -v "$PWD:/repo" \
            aquasec/trivy:0.58.0 \
            fs \
            --scanners vuln \
            --severity CRITICAL,HIGH \
            --ignore-unfixed \
            --exit-code 1 \
            --format table \
            /repo

      - name: Gate summary
        if: always()
        run: echo "SCA complete. CRITICAL/HIGH with an available fix block the merge; unfixed and MEDIUM/LOW are reported."
