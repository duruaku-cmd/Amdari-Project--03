# Reusable gate: SCA (dependency vulnerability scanning) with Trivy.
# Trivy is installed and run DIRECTLY (no wrapper action) to avoid the broken
# transitive setup-trivy version pin in some trivy-action releases.
# THRESHOLD: CRITICAL and HIGH with an available fix block; unfixed/MEDIUM/LOW reported.
# FAILS CLOSED: a Trivy execution error blocks the merge.
name: reusable-sca

on:
  workflow_call:

permissions:
  contents: read

jobs:
  sca:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Trivy (official install script, pinned version)
        run: |
          curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh \
            | sh -s -- -b /usr/local/bin v0.58.0
          trivy --version

      - name: Trivy filesystem scan (dependencies)
        run: |
          trivy fs \
            --scanners vuln \
            --severity CRITICAL,HIGH \
            --ignore-unfixed \
            --exit-code 1 \
            --format table \
            .
        # --exit-code 1: findings at/above severity -> non-zero -> blocks (fail closed)

      - name: Gate summary
        if: always()
        run: echo "SCA complete. CRITICAL/HIGH with an available fix block the merge; unfixed and MEDIUM/LOW are reported."
