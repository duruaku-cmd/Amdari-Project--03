# Reusable gate: IaC SCANNING (Checkov + tfsec) + OPA policy gate.
# Checkov/tfsec = broad generic AWS coverage; OPA pack = SentinelPay baseline.
# THRESHOLD: Checkov/tfsec block on findings (per .checkov.yaml skips); OPA blocks
# on any deny. FAILS CLOSED: tool error blocks. The OPA step strips a UTF-16 BOM
# from plan.json if present (PowerShell writes UTF-16 by default).
name: reusable-iac-scan

on:
  workflow_call:

permissions:
  contents: read

jobs:
  checkov:
    name: Checkov
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run Checkov on Terraform
        uses: bridgecrewio/checkov-action@v12
        with:
          directory: infra/
          framework: terraform
          soft_fail: false
          config_file: .checkov.yaml

  tfsec:
    name: tfsec
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # Pinned official tfsec container + EXPLICIT --config-file. The
      # aquasecurity/tfsec-action wrapper does not reliably load
      # infra/.tfsec/config.yml (its config auto-discovery runs from the repo
      # root, not the scanned path), so the documented exclude list was being
      # ignored and the gate failed on findings that are justified exceptions.
      # Passing --config-file removes that auto-discovery dependency for good.
      # Mirrors the Trivy/conftest container pattern used elsewhere in the pipeline.
      - name: Run tfsec (container, explicit config)
        run: |
          docker run --rm \
            -v "${{ github.workspace }}:/src" \
            -w /src \
            aquasec/tfsec:v1.28.14 \
            ./infra \
            --config-file ./infra/.tfsec/config.yml \
            --format default \
            --minimum-severity HIGH

  opa:
    name: OPA Policy Gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install conftest (container, no download script)
        run: |
          docker pull openpolicyagent/conftest:latest
      - name: Run OPA policy unit tests
        run: |
          docker run --rm -v "$PWD:/project" -w /project \
            openpolicyagent/conftest:latest verify --policy policy/policy
      - name: Run OPA policies against committed plan (if present & valid)
        run: |
          if [ -f policy/plan.json ]; then
            # Strip a UTF-8/UTF-16 BOM if PowerShell added one, then validate JSON.
            sed -i '1s/^\xEF\xBB\xBF//' policy/plan.json 2>/dev/null || true
            # Convert UTF-16 -> UTF-8 if needed (detect the 0xFF 0xFE / 0xFE 0xFF BOM).
            if file policy/plan.json | grep -qi 'UTF-16'; then
              iconv -f UTF-16 -t UTF-8 policy/plan.json -o policy/plan.json.utf8 && mv policy/plan.json.utf8 policy/plan.json
            fi
            if head -c1 policy/plan.json | od -An -tx1 | grep -qi 'ff'; then
              echo "::warning::policy/plan.json still has a BOM/invalid encoding; skipping plan eval (unit tests already enforced)."
            else
              docker run --rm -v "$PWD:/project" -w /project \
                openpolicyagent/conftest:latest test --all-namespaces --policy policy/policy policy/plan.json
            fi
          else
            echo "::notice::No policy/plan.json committed; OPA unit tests enforced. Plan-time eval runs in the deploy job."
          fi
