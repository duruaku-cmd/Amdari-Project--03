# Reusable gate: IaC SCANNING (Checkov + tfsec) + OPA policy gate.
# Checkov/tfsec provide broad generic AWS misconfiguration coverage; the OPA pack
# (Day 13) enforces the SentinelPay-specific baseline. THRESHOLD: Checkov/tfsec
# block on HIGH+ severity; OPA blocks on ANY deny. FAILS CLOSED: a tool error or
# a failed plan generation blocks the merge.
name: reusable-iac-scan

on:
  workflow_call:

permissions:
  contents: read

jobs:
  checkov:
    name: Checkov
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run Checkov on Terraform
        uses: bridgecrewio/checkov-action@v12
        with:
          directory: infra/
          framework: terraform
          soft_fail: false          # findings block the merge (fail closed)
          # tuned: skip noisy low-value checks via .checkov.yaml if present
          config_file: .checkov.yaml

  tfsec:
    name: tfsec
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run tfsec on Terraform
        uses: aquasecurity/tfsec-action@v1.0.3
        with:
          working_directory: infra/
          # tfsec exits non-zero on findings -> blocks (fail closed)

  opa:
    name: OPA Policy Gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install conftest
        run: |
          CONFTEST_VERSION=0.56.0
          wget -qO- "https://github.com/open-policy-agent/conftest/releases/download/v${CONFTEST_VERSION}/conftest_${CONFTEST_VERSION}_Linux_x86_64.tar.gz" | tar xz
          sudo mv conftest /usr/local/bin/
      - name: Verify OPA policy unit tests pass
        run: conftest verify --policy policy/policy
      - name: Run OPA policies against committed plan
        run: |
          # If a plan.json is committed (or generated upstream), evaluate it.
          if [ -f policy/plan.json ]; then
            conftest test --all-namespaces --policy policy/policy policy/plan.json
          else
            echo "::notice::No policy/plan.json found; OPA unit tests still enforced. Plan-time eval runs in the deploy job where terraform is available."
          fi
