# Reusable gate: SAST with Semgrep + Bandit.
# Defends the V-APP bug classes (SQLi, broken JWT, SSRF, command injection).
# THRESHOLD: Semgrep ERROR-severity findings block; WARNING is reported only.
# Bandit blocks on HIGH severity. FAILS CLOSED: tool error blocks the merge.
name: reusable-sast

on:
  workflow_call:

permissions:
  contents: read

jobs:
  semgrep:
    name: Semgrep
    runs-on: ubuntu-latest
    container:
      image: semgrep/semgrep:latest
    steps:
      - uses: actions/checkout@v4
      - name: Run Semgrep (custom SentinelPay rules + security registry)
        run: |
          semgrep scan \
            --config policy/semgrep/sentinelpay.yml \
            --config "p/python" \
            --config "p/security-audit" \
            --error \
            --severity ERROR \
            --metrics off
        # --error: exit non-zero on findings at/above the chosen severity (blocks)
        # --severity ERROR: only ERROR-level findings are blocking (tuned threshold)

  bandit:
    name: Bandit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.11" }
      - name: Install Bandit
        run: pip install bandit
      - name: Run Bandit (block on HIGH severity)
        run: |
          # -r: recurse app source.  --severity-level high: only HIGH blocks.
          # -ll prints MEDIUM+ for visibility; exit code is driven by --severity-level.
          bandit -r . -x ./tests,./.venv -ll --severity-level high -c .github/linters/.bandit.yaml
