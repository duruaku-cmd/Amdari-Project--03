# Reusable gate: SECRET SCANNING with Gitleaks.
# Defends V-CLD-04 / C-04 (hardcoded credentials). Scans the full history of
# the PR. THRESHOLD: any leak = block (secrets are zero-tolerance). FAILS CLOSED:
# a Gitleaks error (non-zero other than "leaks found") also blocks.
name: reusable-secret-scan

on:
  workflow_call:

permissions:
  contents: read

jobs:
  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (full history for a complete scan)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # scan all commits on the branch, not just the tip

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITLEAKS_CONFIG: .gitleaks.toml
          # Threshold is intentionally zero: any detected secret blocks the merge.
        # The action exits non-zero on leaks OR on its own error -> fail closed.

      - name: Gate summary
        if: always()
        run: echo "Secret scanning complete. Any detected secret blocks merge (zero-tolerance)."
