# Reusable gate: SECRET SCANNING with Gitleaks.
# Defends V-CLD-04 / C-04. The BLOCKING scan covers the PR's new commits, so any
# NEW secret blocks the merge. Known legacy findings are pinned in .gitleaksignore
# (documented, non-exploitable placeholders). FAILS CLOSED: a Gitleaks error
# (exit code other than 0 or "leaks found") also blocks.
name: reusable-secret-scan

on:
  workflow_call:

permissions:
  contents: read

jobs:
  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (full history available for scoping)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Gitleaks (blocks on any NEW secret in the PR)
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_CONFIG: .gitleaks.toml
          # On pull_request events the action scans only the PR's commits, so
          # legacy history does not block. .gitleaksignore covers the known
          # historical placeholders for non-PR (push/dispatch) runs too.

      - name: Gate summary
        if: always()
        run: echo "Secret scanning complete. Any NEW secret blocks the merge; documented legacy placeholders are pinned in .gitleaksignore."
